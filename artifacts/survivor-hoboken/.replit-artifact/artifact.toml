kind = "web"
previewPath = "/"
title = "Survivor Hoboken"
version = "1.0.0"
id = "artifacts/survivor-hoboken"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21791

[services.development]
run = "pnpm --filter @workspace/survivor-hoboken run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/survivor-hoboken", "run", "build" ]
publicDir = "artifacts/survivor-hoboken/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21791"
BASE_PATH = "/"
